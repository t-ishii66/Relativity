<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1024, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      width: 1024px;
      height: 1536px;
      overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,.28) 100%),
        url("book-cover3.png") top center / 1024px 1536px no-repeat,
        #000;
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: #fffdf8;
    }
    .cover {
      position: relative;
      width: 100vw;
      height: 1536px;
    }
    .title {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 225px;
      text-align: center;
      font-weight: 800;
      font-size: 102px;
      line-height: 1.08;
      text-shadow:
        0 0 12px rgba(0,0,0,.90),
        0 0 24px rgba(0,0,0,.82),
        0 8px 18px rgba(0,0,0,.60);
    }
    .author {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 150px;
      text-align: center;
      font-weight: 700;
      font-size: 44px;
      color: #fff9ef;
      text-shadow:
        0 0 8px rgba(0,0,0,.88),
        0 0 18px rgba(0,0,0,.76);
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="title">Making Sense<br>of Relativity</div>
    <div class="author">by t-ishii66</div>
  </div>
</body>
</html>
